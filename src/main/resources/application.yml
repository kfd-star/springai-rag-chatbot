spring:
  application:
    name: kfd-ai-agent
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_agent}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:change-me}
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:replace-with-your-dashscope-api-key}
      chat:
        options:
          model: qwen-plus
#    ollama:
#      base-url: http://localhost:11434
#      chat:
#        model: gemma3:1b
#    mcp:
#      client:
##        sse:
##          connections:
##            server1:
##              url: http://localhost:8127
#        stdio:
#          servers-configuration: classpath:mcp-servers.json
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000
server:
  port: 8123
  servlet:
    context-path: /api
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "default"
      paths-to-match: "/**"
      packages-to-scan: com.kfd.kfdaiagent.controller
knife4j:
  enable: true
  setting:
    language: zh_cn
search-api:
  api-key: ${SEARCH_API_KEY:replace-with-your-search-api-key}
logging:
  level:
    org.springframework.ai: DEBUG
